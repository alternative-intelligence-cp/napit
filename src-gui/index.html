<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Napit</title>
    <!-- Use Inter font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --pane-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #007acc;
            --accent-hover: #0098ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --error-color: #ff5252;
            --success-color: #4caf50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(0, 122, 204, 0.15), transparent 400px);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: var(--pane-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            position: relative;
        }

        .pane:last-child {
            border-right: none;
        }

        .pane-header {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border-radius: 8px;
            resize: none;
            outline: none;
            transition: border-color 0.2s ease;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        button.send-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button.send-btn:hover {
            background: var(--accent-hover);
        }

        button.send-btn:active {
            transform: scale(0.97);
        }

        .response-container {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: auto;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            color: var(--text-dim);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255,255,255,0.1);
        }

        .status-success { color: var(--success-color); background: rgba(76, 175, 80, 0.1); }
        .status-error { color: var(--error-color); background: rgba(255, 82, 82, 0.1); }

    </style>
</head>
<body>
    <header>
        <h1>Napit <span style="color:var(--accent-color)">.void</span></h1>
    </header>

    <div class="main-container">
        <!-- Left Pane: Markdown Request Editor -->
        <div class="pane">
            <div class="pane-header">
                Request Editor
                <button id="sendBtn" class="send-btn">Send Request</button>
            </div>
            <textarea id="editor" spellcheck="false">```http
GET https://httpbin.org/get
Accept: application/json
User-Agent: Napit-GUI/0.2.0

```</textarea>
        </div>

        <!-- Right Pane: Response Viewer -->
        <div class="pane">
            <div class="pane-header">
                Response
                <span id="statusBadge" class="status-badge" style="display:none;"></span>
            </div>
            <div id="output" class="response-container">Awaiting request...</div>
        </div>
    </div>

    <!-- Load the parser utility and then the renderer script -->
    <script src="./parser.js"></script>
    <script src="./renderer.js"></script>
</body>
</html>
