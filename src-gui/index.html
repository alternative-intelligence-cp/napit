<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Napit</title>
    <!-- Use Inter font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../node_modules/highlight.js/styles/atom-one-dark.css">
    
    <style>
        :root {
            --bg-color: #121212;
            --pane-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #007acc;
            --accent-hover: #0098ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --error-color: #ff5252;
            --success-color: #4caf50;
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(0, 122, 204, 0.15), transparent 400px);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: var(--pane-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            position: relative;
        }

        .sidebar {
            width: 260px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .sidebar-header {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-btn {
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 15px;
        }

        .sidebar-btn:hover {
            background: var(--accent-color);
            color: white;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .file-item {
            padding: 8px 10px;
            font-size: 13px;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.1s ease, color 0.1s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .file-item.active {
            background: rgba(0, 122, 204, 0.2);
            color: var(--text-main);
            border-left: 3px solid var(--accent-color);
        }

        .pane:last-child {
            border-right: none;
        }

        .pane-header {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .editor-container {
            flex: 1;
            position: relative;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s ease;
        }

        .editor-container:focus-within {
            border-color: var(--accent-color);
        }

        textarea, .editor-highlight {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: auto;
            tab-size: 4;
        }

        .editor-highlight {
            pointer-events: none;
            color: var(--text-main);
            background: transparent;
            z-index: 1;
        }

        textarea {
            color: transparent;
            background: transparent;
            caret-color: var(--text-main);
            resize: none;
            outline: none;
            z-index: 2;
        }

        button.primary-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button.primary-btn:hover {
            background: var(--accent-hover);
        }

        button.primary-btn:active {
            transform: scale(0.97);
        }
        
        button.secondary-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        button.secondary-btn:hover {
            background: rgba(255,255,255,0.05);
        }

        .response-container {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: auto;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            color: var(--text-dim);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255,255,255,0.1);
        }

        .status-success { color: var(--success-color); background: rgba(76, 175, 80, 0.1); }
        .status-error { color: var(--error-color); background: rgba(255, 82, 82, 0.1); }

    </style>
</head>
<body>
    <header>
        <h1>Napit <span style="color:var(--accent-color)">.void</span></h1>
    </header>

    <div class="main-container">
        <!-- Sidebar: Workspace Explorer -->
        <div class="sidebar">
            <div class="sidebar-header">Workspace</div>
            <button id="openFolderBtn" class="sidebar-btn">Open Folder</button>
            
            <div id="envContainer" style="display: none; margin-bottom: 15px;">
                <div style="font-size: 11px; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase;">Environment</div>
                <select id="envSelect" style="width: 100%; background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 6px; border-radius: 4px; outline: none; font-family: 'Inter', sans-serif; font-size: 12px; cursor: pointer;">
                    <option value="" style="background: #121212; color: #fff;">No Environment</option>
                </select>
            </div>

            <ul id="fileList" class="file-list">
                <!-- File items populate here -->
            </ul>
        </div>

        <!-- Middle Pane: Markdown Request Editor -->
        <div class="pane" style="flex: 1.2;">
            <div class="pane-header">
                Request Editor
                <div class="btn-group">
                    <button id="saveBtn" class="secondary-btn" disabled>Save</button>
                    <button id="sendBtn" class="primary-btn">Send Request</button>
                </div>
            </div>
            <div class="editor-container">
                <pre><code id="editorHighlight" class="editor-highlight language-http"></code></pre>
                <textarea id="editor" spellcheck="false">```http
GET https://httpbin.org/get
Accept: application/json
User-Agent: Napit-GUI/0.5.0

```</textarea>
            </div>
        </div>

        <!-- Right Pane: Response Viewer -->
        <div class="pane">
            <div class="pane-header">
                Response
                <span id="statusBadge" class="status-badge" style="display:none;"></span>
            </div>
            <div class="response-container">
                <pre><code id="output" class="language-json">Awaiting request...</code></pre>
            </div>
        </div>
    </div>

    <!-- Load the parser utility and then the renderer script -->
    <script src="./vendor/highlight.min.js"></script>
    <script src="./vendor/json.min.js"></script>
    <script src="./vendor/http.min.js"></script>
    <script src="./parser.js"></script>
    <script src="./renderer.js"></script>
</body>
</html>
